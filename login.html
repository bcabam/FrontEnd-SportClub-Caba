<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Iniciar Sesión</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Merriweather+Sans:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <main class="login-container">
        <header class="logo-container">
            <img src="assets/logo_empresa_letra_v1.png" alt="SportClub Logo" class="login-logo-img">
        </header>

        <section class="login-card">
            <h1>Iniciar Sesión</h1>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required>
                </div>

                <div class="input-group">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>

            <hr class="divider">

            <footer class="login-links">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span class="separator">|</span>
                <a href="#">Registrarse</a>
            </footer>
        </section>
    </main>

<body class="auth-body">
</html>
