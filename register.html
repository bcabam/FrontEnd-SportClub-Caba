<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub - Registro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Merriweather+Sans:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <main class="login-container">
        <header class="logo-container">
            <img src="assets/logo_empresa_letra_v1.png" alt="SportClub Logo" class="login-logo-img">
        </header>

        <section class="login-card">
            <h1>Registrarse</h1>
            
            <form action="#" method="POST">
                <div class="input-group-custom">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre">
                </div>

                <div class="input-group-custom">
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" name="apellidos" placeholder="Ingresa tus apellidos">
                </div>

                <div class="input-group-custom">
                    <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
                </div>

                <div class="input-group-custom">
                    <label for="correo">Correo Electrónico *:</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="input-group-custom">
                    <label for="contrasena">Contraseña *:</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Crea tu contraseña" required>
                </div>

                <div class="input-group-custom">
                    <label for="practica_deporte">¿Practicas algún deporte actualmente?</label>
                    <select id="practica_deporte" name="practica_deporte" class="form-select">
                        <option value="" selected disabled>Selecciona una opción</option>
                        <option value="si">Sí, regularmente</option>
                        <option value="ocasional">De vez en cuando</option>
                        <option value="no">No, soy principiante</option>
                    </select>
                </div>

                <div class="input-group-custom-choices mb-3">
                    <label class="section-label">Actividades que te interesan:</label>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="musculacion" id="act_musculacion" name="intereses[]">
                        <label class="form-check-label" for="act_musculacion">Musculatura / Máquinas</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="cardio" id="act_cardio" name="intereses[]">
                        <label class="form-check-label" for="act_cardio">Cardio / Spinning</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="clases" id="act_clases" name="intereses[]">
                        <label class="form-check-label" for="act_clases">Clases Dirigidas (Zumba, Yoga)</label>
                    </div>
                </div>

                <div class="input-group-custom-choices mb-4">
                    <label class="section-label">¿Cuál es tu objetivo principal? *</label>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="objetivo" id="obj_peso" value="perder_peso" required>
                        <label class="form-check-label" for="obj_peso">Perder peso / Quemar grasa</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="objetivo" id="obj_masa" value="ganar_masa">
                        <label class="form-check-label" for="obj_masa">Ganar masa muscular / Fuerza</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="objetivo" id="obj_salud" value="salud">
                        <label class="form-check-label" for="obj_salud">Salud / Resistencia física</label>
                    </div>
                </div>

                <button type="submit" class="btn-ingresar">Registrarse</button>
            </form>

            <hr class="divider">
            <footer class="login-links">
                <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
            </footer>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<body class="auth-body">
</html>
